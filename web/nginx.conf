server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable buffering for SSE/event-style responses if ever proxied through nginx.
    proxy_buffering off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
